name: Build Docker Image

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Zad6/docker/**'
      - 'Zad6/k8s/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Zad6/docker/**'

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: ${{ secrets.REGISTRY_ID }}
  IMAGE_NAME: test-app

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Yandex Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: json_key
        password: ${{ secrets.YC_SA_KEY }}

    - name: Build and push (PR)
      if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v4
      with:
        context: ./Zad6/docker
        push: false
        tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push (main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v4
      with:
        context: ./Zad6/docker
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image info
      run: |
        echo "✅ Image built:"
        echo "  - ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
