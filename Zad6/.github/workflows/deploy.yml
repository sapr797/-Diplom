name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'Zad6/k8s/**'

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f Zad6/k8s/configmap.yaml
        kubectl apply -f Zad6/k8s/deployment.yaml
        kubectl apply -f Zad6/k8s/service.yaml
        kubectl apply -f Zad6/k8s/ingress.yaml

    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/test-app -n default --timeout=5m

    - name: Verify deployment
      run: |
        echo "✅ Deployment successful!"
        kubectl get pods -n default
        kubectl get svc -n default
        kubectl get ingress -n default
