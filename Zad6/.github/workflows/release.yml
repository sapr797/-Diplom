name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: ${{ secrets.REGISTRY_ID }}
  IMAGE_NAME: test-app

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Yandex Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: json_key
        password: ${{ secrets.YC_SA_KEY }}

    - name: Build and push with tag
      uses: docker/build-push-action@v4
      with:
        context: ./Zad6/docker
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    - name: Update image tag in deployment
      run: |
        sed -i "s|image:.*|image: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}|g" Zad6/k8s/deployment.yaml

    - name: Deploy with new tag
      run: |
        kubectl apply -f Zad6/k8s/deployment.yaml
        kubectl rollout status deployment/test-app -n default --timeout=5m

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## 🚀 Release ${{ github.ref_name }}
          
          ### Changes:
          - Docker image: `${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
          - Deployed to Kubernetes
        draft: false
        prerelease: false
