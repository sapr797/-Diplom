<!DOCTYPE html>
<html>
<head>
    <title>DevOps Diplom Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background: #4CAF50;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 10px 0;
        }
        .version {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DevOps Diplom Project</h1>
        <div class="badge">✅ CI/CD Pipeline</div>
        <p>Yandex Cloud • Kubernetes</p>
        <div class="version">
            <p>Version: <span id="version">v1.0.0</span></p>
            <p>Deployed: <span id="datetime"></span></p>
        </div>
        <div class="footer">
            Powered by GitHub Actions • Managed by Kubernetes
        </div>
    </div>
    <script>
        document.getElementById('datetime').textContent = new Date().toLocaleString('ru-RU');
    </script>
</body>
</html>
